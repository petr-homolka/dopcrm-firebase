<!doctype html>
<html lang="cs">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Děti · Doprovázení CRM</title>
<link rel="stylesheet" href="style.css?v=35">
<link rel="manifest" href="manifest.webmanifest"><meta name="theme-color" content="#ffffff"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="default"><meta name="apple-mobile-web-app-title" content="Doprovázení"><link rel="apple-touch-icon" href="icon-192.png">
<link rel="stylesheet" href="mobile.css?v=37">
</head>
<body>
<div class="app">
  <nav class="rail" id="rail"></nav>

  <aside class="side">
    <div class="org" title="Přepnout organizaci / nastavení">
      <div class="org-logo">D</div>
      <div class="org-meta"><div class="t">Doprovázení, z.s.</div><div class="s">Pobočka Brno</div></div>
      <svg class="chev" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
    </div>
    <button class="btn-primary" style="margin-top:6px">+ Nové dítě</button>
    <div class="side-search">
      <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4-4"/></svg>
      <input placeholder="Hledat dítě…">
    </div>
    <div class="sec-label">Pohledy</div>
    <div class="nav">
      <div class="nav-item active" onclick="setView('all',this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg> Všechny děti <span class="count" id="c-all"></span></div>
    </div>
    <div class="sec-label">Podle typu péče</div>
    <div class="nav">
      <div class="nav-item" onclick="setView('long',this)"><span class="dot" style="background:var(--care-long)"></span> Dlouhodobá <span class="count" id="c-long"></span></div>
      <div class="nav-item" onclick="setView('temp',this)"><span class="dot" style="background:var(--care-temp)"></span> Přechodná <span class="count" id="c-temp"></span></div>
      <div class="nav-item" onclick="setView('kin',this)"><span class="dot" style="background:var(--care-kin)"></span> Příbuzenská <span class="count" id="c-kin"></span></div>
    </div>
    <div class="side-foot">
      <div class="sep-line"></div>
      <div class="account">
        <span class="avatar" style="width:34px;height:34px;font-size:12px;background:var(--avatar-neutral)">MD</span>
        <div class="meta"><div class="n">Martin Dvořák</div><div class="r">Doprovázející pracovník</div></div>
        <svg class="cog" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3M5 5l2 2M17 17l2 2M19 5l-2 2M7 17l-2 2"/></svg>
      </div>
    </div>
  </aside>

  <main class="main">
    <div class="topbar">
      <h2 style="margin-right:8px">Děti</h2>
      <div class="search">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4-4"/></svg>
        <input id="search" placeholder="Hledat dítě…" oninput="applyFilters()">
      </div>
      <div class="spacer"></div>
      <div class="seg theme-switch" id="themeseg"><button class="on" data-theme="">Klasický</button><button data-theme="b">Čistý</button></div>
    </div>
    <div class="content"><div id="tbl"></div>
      <div class="footnote">Ukázková data (smyšlená). Děti · typ péče je status dítěte; příbuzní jako záložka v kartě.</div>
    </div>
  </main>
</div>

<script src="app.js?v=65"></script>
<script>
document.getElementById('rail').innerHTML = App.renderRail('Děti');
App.initTheme(document.getElementById('themeseg'));
App.gateAdd('contacts.edit');
function toast(t){let e=document.getElementById('toast');if(!e){e=document.createElement('div');e.id='toast';e.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1A1A1A;color:#fff;padding:11px 18px;border-radius:10px;z-index:1600;box-shadow:var(--shadow-pop)';document.body.appendChild(e);}e.textContent=t;e.style.opacity='1';clearTimeout(e._t);e._t=setTimeout(()=>e.style.opacity='0',1600);}

const items = App.visibleChildren();
const ageBucket = k => k.age<=6 ? '0–6 let' : (k.age<=12 ? '7–12 let' : '13–18 let');
const relCount = k => Array.isArray(k.relatives) ? k.relatives.length : (k.relatives||0);
const relLink = k => relCount(k)
  ? `<span class="rel-link" title="Záložka v kartě dítěte"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="8" r="3"/><circle cx="17" cy="9" r="2"/><path d="M3 19c0-3 2.5-5 6-5s6 2 6 5"/></svg> Příbuzní (${relCount(k)})</span>`
  : `<span class="rel-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg> Přidat</span>`;

const columns = [
  {key:'fam',    label:'Dítě',            w:'2.2fr', on:true, locked:true},
  {key:'age',    label:'Věk',             w:'.7fr',  on:true},
  {key:'care',   label:'Typ péče',        w:'1.3fr', on:true},
  {key:'house',  label:'Domácnost',       w:'1.8fr', on:true},
  {key:'fosters',label:'Pěstouni',        w:'1.6fr', on:false},
  {key:'rel',    label:'Příbuzní',        w:'1.2fr', on:true},
  {key:'worker', label:'Pracovník',       w:'1.2fr', on:false},
  {key:'next',   label:'Příští návštěva', w:'1.4fr', on:false},
];

function cell(k,key,idx,x){
  const h=k.household;
  switch(key){
    case 'fam': return `<div class="fam">${App.swap(App.avatar(k.n,k.care,k.photo),x.cb)}<div><div class="name">${k.n}</div><div class="sub">${h.city}${h.district?` · ${h.district}`:''}</div></div></div>`;
    case 'age': return `${k.age} let`;
    case 'care': return App.careBadge(k.care);
    case 'house': return h.name;
    case 'fosters': return h.fosters.filter(p=>p.isFoster).map(p=>p.n).join(', ');
    case 'rel': return relLink(k);
    case 'worker': return h.worker;
    case 'next': return `<span class="muted">${App.fmtDateTime(h.next)}</span>`;
  }
}
function card(k,idx,x){
  const h=k.household;
  return `<div class="card" onclick="App._t.open('k','${k.id}')"><div class="card-cb">${x.cb}</div>
    <div class="top">${App.avatar(k.n,k.care,k.photo)}<div><div class="name">${k.n}</div><div class="sub">${k.age} let · ${h.name}</div></div></div>
    <div class="meta-row"><span>Typ péče</span>${App.careBadge(k.care)}</div>
    <div class="meta-row"><span>Příbuzní</span><b>${relCount(k)}</b></div></div>`;
}
const groupers = {
  care:   {label:'Typ péče', fn:k=>App.CARE[k.care][1]},
  age:    {label:'Věk', fn:ageBucket},
  ko:     {label:'Klíčová osoba (KO)', fn:k=>k.household.worker},
  do:     {label:'Doprovázející org. (DO)', fn:k=>k.household.do},
  loc:    {label:'Lokalita', fn:k=>k.household.district||k.household.city},
};

function openK(k){
  const h=k.household;
  App.openDrawer(`
    <div class="drawer-head"><button class="x" onclick="App.closeDrawer()">✕</button>
      <div class="fam">${App.avatar(k.n,k.care,k.photo)}<div><div class="name" style="font-size:18px">${k.n}</div><div class="sub">${k.age} let · ${h.name}</div></div></div>
    </div>
    <div class="drawer-body">
      <div class="section-title">Upozornění</div>
      <div class="alerts">${App.upoz((()=>{ const a=[];
        if(h.status==='due') a.push(['due','Návštěva po termínu',`Měla proběhnout do ${App.fmtDate(h.next.iso)}.`]);
        if(h.status==='warn') a.push(['warn','Vyžaduje pozornost', h.note||'Zkontrolujte případ.']);
        return a; })())}</div>

      <div class="field"><span class="k">Typ péče</span>${App.careBadge(k.care)}</div>
      <div class="field"><span class="k">Rodné číslo</span><span>${k.rc||'—'}</span></div>
      <div class="field"><span class="k">Domácnost</span><span>${h.name}</span></div>
      <div class="field"><span class="k">Pracovník</span><span>${h.worker}</span></div>

      <div class="section-title">Pěstouni</div>
      ${h.fosters.filter(p=>p.isFoster).map(p=>`<div class="person">${App.avatar(p.n,null,p.photo,40,'sq')}<div class="meta"><div class="n">${p.n}</div><div class="r">Pěstoun</div></div></div>`).join('')}

      <div class="section-title">Biologická / širší rodina <span class="muted" style="font-weight:400">(záložka karty)</span></div>
      ${relsHtml(k)}
      <p class="muted" style="font-size:11px;padding:2px 10px 0;line-height:1.5">Práva k dítěti má jen rodič zapsaný v rodném listě (RL). Otec = vždy muž v RL (1.–3. domněnka); matka = žena, která porodila (§775).</p>
      ${siblingsHtml(k)}

      <div class="section-title">Poslední záznamy</div>
      <div class="recs">
        <div class="rec"><div class="when">28. 5. 2026<div class="dur">15:30–16:25</div></div><div class="what"><div class="rt">Návštěva</div><div class="rd">Dítě spokojené, prospívá.</div></div></div>
        <div class="rec"><div class="when">15. 5. 2026<div class="dur">—</div></div><div class="what"><div class="rt">Asistovaný kontakt s matkou</div><div class="rd">Proběhl v pořádku.</div></div></div>
      </div>
      <div class="section-title">Akce</div>
      <button class="btn-primary" style="margin-bottom:8px">Zaznamenat kontakt</button>
      <a class="btn-secondary" style="margin-top:0;text-decoration:none" href="hub.html?typ=dite&id=${k.id}">Otevřít Hub dítěte</a>
    </div>`);
}

const T=App.Table({ id:'k', mount:document.getElementById('tbl'), items, columns, cell, card, groupers, onOpen:openK });
document.getElementById('c-all').textContent=items.length;
document.getElementById('c-long').textContent=items.filter(k=>k.care==='long').length;
document.getElementById('c-temp').textContent=items.filter(k=>k.care==='temp').length;
document.getElementById('c-kin').textContent=items.filter(k=>k.care==='kin').length;
let view='all';
function applyFilters(){ const q=(document.getElementById('search').value||'').toLowerCase().trim();
  let r=items; if(view!=='all')r=r.filter(k=>k.care===view);
  if(q)r=r.filter(k=>(k.n+' '+k.household.name+' '+k.household.worker).toLowerCase().includes(q)); T.setItems(r); }
function setView(v,el){ view=v; document.querySelectorAll('.side .nav-item').forEach(x=>x.classList.remove('active')); if(el)el.classList.add('active'); applyFilters(); }
window.applyFilters=applyFilters; window.setView=setView;

/* ===== Příbuzní / rodiče (rodinné právo ČR) ===== */
function legalBadge(m){ if(m.legal===true) return '<span style="font-size:10px;background:var(--alert-ok-soft,#e6f6ec);color:#1a8a4a;border-radius:10px;padding:1px 7px;margin-left:6px">práva k dítěti</span>';
  if(m.legal===false) return '<span style="font-size:10px;background:var(--alert-due-soft);color:var(--alert-due);border-radius:10px;padding:1px 7px;margin-left:6px">bez práv</span>';
  if(m.legal==='rep') return '<span style="font-size:10px;background:var(--active);color:var(--text-2);border-radius:10px;padding:1px 7px;margin-left:6px">zákonný zástupce</span>';
  if(m.legal==='birth') return '<span style="font-size:10px;background:var(--active);color:var(--text-2);border-radius:10px;padding:1px 7px;margin-left:6px">matkou z porodu</span>';
  return ''; }
function relsHtml(k){ const rs=k.relatives||[]; if(!rs.length) return `<p class="muted" style="padding:4px 10px">Zatím nejsou evidováni žádní příbuzní. <a href="#" onclick="Rel.add('${k.id}');return false">Přidat</a></p>`;
  const groups={}; rs.forEach(r=>{ const m=App.relMeta(r.rel); (groups[m.g]=groups[m.g]||[]).push({r,m}); });
  const order=['Matka','Otec','Sourozenci','Osvojitel / zástupce','Širší rodina'];
  return order.filter(g=>groups[g]).map(g=>`<div class="muted" style="font-size:11px;text-transform:uppercase;letter-spacing:.03em;padding:8px 10px 2px">${g}</div>`+groups[g].map(({r,m})=>`<div class="person"><span class="avatar sq" style="width:40px;height:40px;font-size:14px;background:var(--avatar-neutral)">${App.ini(r.n)}</span><div class="meta"><div class="n">${r.n}${legalBadge(m)}</div><div class="r">${r.rel}${r.rc?' · RČ '+r.rc:''}${r.note?' · '+r.note:''}</div></div></div>`).join('')).join('')
    + `<div style="padding:6px 10px"><a href="#" onclick="Rel.add('${k.id}');return false">+ přidat příbuzného</a></div>`; }
function siblingsHtml(k){ const sibs=App.linkedSiblings(k.id); if(!sibs.length) return '';
  return `<div class="section-title">Sourozenci v systému <span class="muted" style="font-weight:400">(auto dle bio rodičů)</span></div>`
   + sibs.map(s=>`<div class="person" style="cursor:pointer" onclick="App._t.open('k','${s.id}')"><span class="avatar" style="width:40px;height:40px;font-size:14px;background:var(--avatar-neutral)">${App.ini(s.n)}</span><div class="meta"><div class="n">${s.n}</div><div class="r">${s.type} · ${s.household} · společný rodič: ${s.via}</div></div></div>`).join(''); }
function relModal(html){ let o=document.getElementById('relModal'); if(o)o.remove(); o=document.createElement('div'); o.id='relModal'; o.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1500;display:flex;align-items:center;justify-content:center;padding:18px'; o.onclick=e=>{if(e.target===o)o.remove();}; o.innerHTML=`<div style="background:var(--surface);border-radius:16px;max-width:460px;width:100%;max-height:90vh;overflow:auto;box-shadow:var(--shadow-pop)"><div style="display:flex;padding:14px 18px;border-bottom:1px solid var(--border)"><b style="flex:1">Příbuzný / rodič dítěte</b><button onclick="document.getElementById('relModal').remove()" style="border:none;background:none;font-size:20px;cursor:pointer">✕</button></div><div style="padding:16px 18px">${html}</div></div>`; document.body.appendChild(o); }
const Rel={ _kid:null,
  add(kidId){ Rel._kid=kidId; const groups=App.relGroups();
    relModal(`<div style="margin-bottom:10px"><button class="btn-secondary" style="width:auto;margin:0;padding:7px 12px;border-color:var(--accent);color:var(--accent)" onclick="Rel.fatherWizard()">Pomoct s otcem (rodný list)</button></div>
      <label style="font-size:13px;font-weight:600">Vztah k dítěti</label>
      <select id="rel-type" onchange="Rel.hint()" style="width:100%;margin:4px 0 6px;border:1px solid var(--border-2);border-radius:10px;padding:9px;background:var(--surface);color:var(--text)">${Object.entries(groups).map(([g,arr])=>`<optgroup label="${g}">${arr.map(t=>`<option value="${t.key}">${t.label}</option>`).join('')}</optgroup>`).join('')}</select>
      <div id="rel-hint" class="muted" style="font-size:12px;min-height:32px;margin-bottom:8px;line-height:1.45"></div>
      <label style="font-size:13px;font-weight:600">Jméno</label><input id="rel-name" placeholder="jméno a příjmení" style="width:100%;margin:4px 0 8px;border:1px solid var(--border-2);border-radius:10px;padding:9px">
      <label style="font-size:13px;font-weight:600">Rodné číslo <span class="muted" style="font-weight:400">(primární identifikátor – nemění se)</span></label><input id="rel-rc" placeholder="např. 765912/3210" style="width:100%;margin:4px 0 8px;border:1px solid var(--border-2);border-radius:10px;padding:9px">
      <label style="font-size:13px;font-weight:600">Poznámka (nepovinné)</label><input id="rel-note" placeholder="např. styk 1× měsíčně, č.j. soudu…" style="width:100%;margin:4px 0 12px;border:1px solid var(--border-2);border-radius:10px;padding:9px">
      <button class="btn-primary" style="width:auto;padding:9px 16px" onclick="Rel.save()">Přidat příbuzného</button>`);
    Rel.hint(); },
  hint(){ const sel=document.getElementById('rel-type'); const t=App.REL_TYPES.find(x=>x.key===(sel&&sel.value)); const el=document.getElementById('rel-hint'); if(el)el.textContent=t&&t.hint?t.hint:''; },
  save(){ const sel=document.getElementById('rel-type'); const t=App.REL_TYPES.find(x=>x.key===(sel&&sel.value)); const name=((document.getElementById('rel-name')||{}).value||'').trim(); const rc=((document.getElementById('rel-rc')||{}).value||'').trim(); const note=((document.getElementById('rel-note')||{}).value||'').trim();
    if(!t||!name){toast('Vyber vztah a zadej jméno');return;}
    const k=items.find(x=>x.id===Rel._kid); if(!k)return; App.addChildRelative(k.id,{n:name,rc,rel:t.label,key:t.key,legal:t.legal,note});
    const m=document.getElementById('relModal'); if(m)m.remove(); openK(k); applyFilters(); toast('Příbuzný přidán'); },
  fatherWizard(){ relModal(`<div style="font-size:13px;line-height:1.55">
    <p style="margin-top:0"><b>Otec = vždy muž zapsaný v rodném listě (RL).</b> Odpověz a systém poradí správný zápis:</p>
    <div style="font-weight:600;margin-bottom:5px">1) Je v rodném listě zapsán otec?</div>
    <div style="display:flex;gap:8px;margin-bottom:12px"><button class="btn-secondary" style="width:auto;margin:0;padding:7px 16px" onclick="Rel.fw(0)">Ne</button><button class="btn-secondary" style="width:auto;margin:0;padding:7px 16px" onclick="Rel.fwYes()">Ano</button></div>
    <div id="fw2"></div></div>`); },
  fwYes(){ const el=document.getElementById('fw2'); if(el)el.innerHTML=`<div style="font-weight:600;margin-bottom:5px">2) Domníváte se, že zapsaný otec NENÍ biologický?</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap"><button class="btn-secondary" style="width:auto;margin:0;padding:7px 14px" onclick="Rel.fw(1)">Ne – zapsaný je nejspíš bio</button><button class="btn-secondary" style="width:auto;margin:0;padding:7px 14px" onclick="Rel.fw(2)">Ano – bio je nejspíš jiný muž</button></div>`; },
  fw(c){ let msg=''; if(c===0) msg='Případného domnělého otce zapiš jako <b>„Bio-otec (pravděpodobný)"</b>. Dítě zatím v RL otce nemá.';
    else if(c===1) msg='Zapsaného otce zapiš jako <b>„Otec (v rodném listě)"</b>. Pokud je domněnka na jiného biolog. otce, jeho jako <b>„Bio-otec (domnělý)"</b>.';
    else msg='Zapsaného otce zapiš jako <b>„Otec sociální (v RL)"</b> a domnělého biologického jako <b>„Bio-otec (pravděpodobný)"</b>.';
    relModal(`<div style="font-size:13px;line-height:1.6"><p style="margin-top:0">${msg}</p><p class="muted" style="font-size:12px">Práva k dítěti má jen otec v RL. Změna zápisu pouze soudem (nejprve popření otcovství, pak určení dle DNA); soud nemusí popřít v nejvyšším zájmu dítěte.</p><button class="btn-primary" style="width:auto;padding:8px 16px" onclick="Rel.add('${Rel._kid}')">Pokračovat na přidání</button></div>`); },
};
window.Rel=Rel;
</script>
<script src="mobile.js?v=66"></script>
</body>
</html>
