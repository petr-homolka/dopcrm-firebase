<!doctype html>
<html lang="cs">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Ostatní kontakty · Doprovázení CRM</title>
<link rel="stylesheet" href="style.css?v=35">
<link rel="manifest" href="manifest.webmanifest"><meta name="theme-color" content="#ffffff"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="default"><meta name="apple-mobile-web-app-title" content="Doprovázení"><link rel="apple-touch-icon" href="icon-192.png">
<link rel="stylesheet" href="mobile.css?v=37">
</head>
<body>
<div class="app">
  <nav class="rail" id="rail"></nav>

  <aside class="side">
    <div class="org" title="Přepnout organizaci / nastavení">
      <div class="org-logo">D</div>
      <div class="org-meta"><div class="t">Doprovázení, z.s.</div><div class="s">Pobočka Brno</div></div>
      <svg class="chev" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
    </div>
    <button class="btn-primary" style="margin-top:6px">+ Nový kontakt</button>
    <div class="side-search">
      <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4-4"/></svg>
      <input placeholder="Hledat kontakt…">
    </div>
    <div class="sec-label">Kategorie</div>
    <div class="tree" id="tree"></div>
    <div class="side-foot">
      <div class="sep-line"></div>
      <div class="account">
        <span class="avatar" style="width:34px;height:34px;font-size:12px;background:var(--avatar-neutral)">MD</span>
        <div class="meta"><div class="n">Martin Dvořák</div><div class="r">Doprovázející pracovník</div></div>
      </div>
    </div>
  </aside>

  <main class="main">
    <div class="topbar">
      <h2 id="catTitle" style="margin-right:8px">Všechny kontakty</h2>
      <div class="search">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4-4"/></svg>
        <input id="search" placeholder="Hledat organizaci nebo osobu…" oninput="setQ(this.value)">
      </div>
      <div class="spacer"></div>
      <div class="seg theme-switch" id="themeseg"><button class="on" data-theme="">Klasický</button><button data-theme="b">Čistý</button></div>
    </div>
    <div class="content"><div id="list"></div>
      <div class="footnote">Ukázková data (smyšlená). Ostatní kontakty · právnické osoby s kontaktními osobami, ad-hoc přiřaditelné k dítěti / pěstounovi.</div>
    </div>
  </main>
</div>

<script src="app.js?v=65"></script>
<script>
document.getElementById('rail').innerHTML = App.renderRail('Ostatní');
App.initTheme(document.getElementById('themeseg'));
App.gateAdd('contacts.edit');

/* Strom kategorií + entity ze SDÍLENÉHO globálního číselníku (App) */
const CATS = App.instCats();
let CONTACTS = App.institutions();

let active = '';   // '' = vše
const catLabel = id => id ? App.instCatLabel(id) : 'Všechny kontakty';

function renderTree(){
  const t=document.getElementById('tree');
  let html = `<div class="cat ${active===''?'active':''}" data-c=""><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7h18M3 12h18M3 17h18"/></svg> Všechny <span class="count">${CONTACTS.length}</span></div>`;
  CATS.forEach(([grp,items])=>{
    html += `<div class="sec-label" style="padding:10px 12px 4px">${grp}</div>`;
    items.forEach(([id,label])=>{
      const n=CONTACTS.filter(c=>c.cat===id).length;
      html += `<div class="cat ${active===id?'active':''}" data-c="${id}"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/></svg> ${label} <span class="count">${n}</span></div>`;
    });
  });
  t.innerHTML=html;
  t.querySelectorAll('.cat').forEach(el=>el.onclick=()=>{ active=el.dataset.c; document.getElementById('catTitle').textContent=catLabel(active); renderTree(); renderList(); });
}

let q='';
window.setQ=v=>{q=(v||'').toLowerCase().trim();renderList();};
function renderList(){
  let list = active? CONTACTS.filter(c=>c.cat===active) : CONTACTS;
  if(q) list=list.filter(c=>(c.name+' '+c.org+' '+c.persons.map(p=>p.n+' '+p.role).join(' ')).toLowerCase().includes(q));
  document.getElementById('list').innerHTML = `<div class="list">
    <div class="list-head" style="grid-template-columns:2.2fr 1.6fr 1.8fr 1.4fr">
      <div>Název</div><div>Typ / zřizovatel</div><div>Kontaktní osoba</div><div>Přiřazeno k</div></div>
    ${list.map(c=>`<div class="row" style="grid-template-columns:2.2fr 1.6fr 1.8fr 1.4fr" onclick="openContact('${c.name.replace(/'/g,'')}')">
      <div class="fam">${App.avatar(c.name,null,null,40,'sq')}<div><div class="name">${c.name}</div><div class="sub">${catLabel(c.cat)}${c._local?' · <span style="color:var(--alert-warn)">lokálně upraveno</span>':''}</div></div></div>
      <div><span class="org-type">${c.type==='PO'?'Právnická osoba':'Fyzická osoba'}</span>${c.org?`<div class="sub" style="margin-top:3px">${c.org}</div>`:''}</div>
      <div>${c.persons.map(p=>`<div><b style="font-weight:600">${p.n}</b><div class="sub">${p.role}</div></div>`).join('')}</div>
      <div>${c.assigned.length? c.assigned.map(a=>`<span class="tag">${a}</span>`).join('') : '<span class="muted">—</span>'}</div>
    </div>`).join('')}
  </div>`;
}
function openContact(name){
  const c = CONTACTS.find(x=>x.name.replace(/'/g,'')===name);
  App.openDrawer(`
    <div class="drawer-head"><button class="x" onclick="App.closeDrawer()">✕</button>
      <div class="fam">${App.avatar(c.name,null,null,44,'sq')}<div><div class="name" style="font-size:18px">${c.name}</div><div class="sub">${catLabel(c.cat)} · ${c.type==='PO'?'právnická osoba':'fyzická osoba'}</div></div></div>
    </div>
    <div class="drawer-body">
      ${c._local?'<div class="alert warn" style="margin-bottom:8px"><div><div class="a-t">Upraveno pro vaši organizaci</div><div>Globální číselník zůstává beze změny.</div></div></div>':''}
      ${c.org?`<div class="field"><span class="k">Zřizovatel / org.</span><span>${c.org}</span></div>`:''}
      ${c.note?`<div class="field"><span class="k">Lokální poznámka</span><span>${c.note}</span></div>`:''}
      <div class="section-title">Kontaktní osoby</div>
      ${c.persons.map(p=>`<div class="person">${App.avatar(p.n,null,null,40,'sq')}<div class="meta"><div class="n">${p.n}</div><div class="r">${p.role}</div></div></div>`).join('')}
      <div style="padding:4px 10px"><a href="#">+ přidat kontaktní osobu</a></div>

      <div class="section-title">Přiřazeno k</div>
      ${c.assigned.length? c.assigned.map(a=>`<span class="tag">${a}</span>`).join('') : '<p class="muted" style="padding:4px 10px">Zatím nepřiřazeno.</p>'}
      <div style="padding:8px 10px"><a href="#">+ přiřadit k dítěti / pěstounovi</a></div>

      <div class="section-title">Akce</div>
      <button class="btn-primary" style="margin-bottom:8px">Přiřadit ke kontaktu</button>
      ${App.can('contacts.edit')?`<button class="btn-secondary" style="margin:0 0 8px;width:100%" onclick="locEdit('${c.id}')">Upravit pro naši organizaci</button>${c._local?`<button class="btn-secondary" style="margin:0 0 8px;width:100%" onclick="locReset('${c.id}')">Zrušit lokální úpravu</button>`:''}`:''}
      <a class="btn-secondary" style="margin-top:0;text-decoration:none" href="hub.html?typ=ostatni">Otevřít Hub</a>
    </div>`);
}
window.locEdit=function(id){
  const c=CONTACTS.find(x=>x.id===id); if(!c)return;
  const org=prompt('Zřizovatel / org. (lokálně pro vaši organizaci):',c.org||''); if(org===null)return;
  const note=prompt('Lokální poznámka (nepovinné):',c.note||''); if(note===null)return;
  App.setInstitutionLocal(id,{org:org,note:note});
  refresh(); const nc=CONTACTS.find(x=>x.id===id); App.closeDrawer(); openContact(nc.name.replace(/'/g,''));
};
window.locReset=function(id){ App.resetInstitutionLocal(id); refresh(); App.closeDrawer(); };
function refresh(){ CONTACTS=App.institutions(); renderTree(); renderList(); }

renderTree(); renderList();
</script>
<script src="mobile.js?v=66"></script>
</body>
</html>
